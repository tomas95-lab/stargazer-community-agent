name: Daily Thread

on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish daily thread
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npx tsx src/index.ts --dry-run --yes
          else
            npx tsx src/index.ts --publish --yes
          fi
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_CLIENT_ID: ${{ secrets.DISCOURSE_API_CLIENT_ID }}
          DISCOURSE_USERNAME: ${{ secrets.DISCOURSE_USERNAME }}
          COMMUNITY_BASE_URL: ${{ secrets.COMMUNITY_BASE_URL }}
          COMMUNITY_CATEGORY_ID: ${{ secrets.COMMUNITY_CATEGORY_ID }}
          COMMUNITY_CHAT_CHANNEL_ID: ${{ secrets.COMMUNITY_CHAT_CHANNEL_ID }}
