name: Webinar Reminder

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check and send webinar reminders
        run: npx tsx src/webinar-reminder.ts
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_CLIENT_ID: ${{ secrets.DISCOURSE_API_CLIENT_ID }}
          COMMUNITY_BASE_URL: ${{ secrets.COMMUNITY_BASE_URL }}
          COMMUNITY_CHAT_CHANNEL_ID: ${{ secrets.COMMUNITY_CHAT_CHANNEL_ID }}
